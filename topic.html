<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRAAP Analyzer - Step 1</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: bold;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Step 1: Research Topic</h1>

  <label for="topic">Enter Your Research Topic</label>
  <input id="topic" placeholder="Enter research topic">

  <button onclick="saveTopic()">Next</button>
</div>

<script>
function saveTopic() {
  const topic = document.getElementById("topic").value;

  // Validation check
  if (!topic) {
    alert("Please enter a research topic before continuing.");
    return;
  }

  // Save to localStorage
  localStorage.setItem("topic", topic);

  // Go to next page
  window.location.href = "article.html";
}
</script>

</body>
</html>
