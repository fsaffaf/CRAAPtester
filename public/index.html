<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>CRAAP Analyzer</title>

<style>
body {
  font-family: Arial;
  max-width: 900px;
  margin: auto;
  padding: 20px;
  background: #f4f4f4;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 10px;
}

input {
  width: 100%;
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #2d6cdf;
  color: white;
  border: none;
}

.box {
  background: white;
  margin-top: 10px;
  padding: 10px;
  border-radius: 8px;
}

.pass { border-left: 6px solid green; }
.caution { border-left: 6px solid orange; }
.fail { border-left: 6px solid red; }
</style>
</head>

<body>

<h1>CRAAP Analyzer</h1>

<div class="card">
  <input id="url" placeholder="Paste article URL here" />
  <button onclick="analyze()">Analyze</button>
</div>

<div id="output"></div>

<script>
async function analyze() {
  const url = document.getElementById("url").value;

  const res = await fetch("/analyze", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ url })
  });

  const data = await res.json();

  let html = "";

  for (let key in data) {
    if (key === "meta") continue;

    const item = data[key];

    html += `
      <div class="box ${item.status.toLowerCase()}">
        <h3>${key}</h3>
        <p><strong>${item.status}</strong></p>
        <p>${item.explanation}</p>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
