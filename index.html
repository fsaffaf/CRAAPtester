<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Auto-Evaluator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .box {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 6px solid #ccc;
  }

  .pass { border-left-color: green; color: green; font-weight: bold; }
  .caution { border-left-color: orange; color: orange; font-weight: bold; }
  .fail { border-left-color: red; color: red; font-weight: bold; }

  .question {
    font-style: italic;
    color: #444;
    margin: 5px 0;
  }

  .small {
    font-size: 0.9em;
    color: #555;
  }
</style>
</head>

<body>

<h1>CRAAP Auto-Evaluator</h1>

<div class="card">
  <label>Your Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Article Title / URL / Text</label>
  <input id="source" placeholder="Paste article title or URL" />

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Analysis</h2>
  <div id="output">
    <div class="box small">Results will appear here after evaluation.</div>
  </div>
</div>

<script>
function scoreToResult(score) {
  if (score >= 4) {
    return {
      label: "PASS",
      class: "pass",
      explanation: "Strong reliability for this category."
    };
  }
  if (score === 3) {
    return {
      label: "CAUTION",
      class: "caution",
      explanation: "Moderate reliability; requires cross-checking."
    };
  }
  return {
    label: "FAIL",
    class: "fail",
    explanation: "Low reliability for academic use."
  };
}

/* -------------------------
   SIMPLE AUTO-EVALUATION MODEL
   (rule-based heuristics)
-------------------------- */

function evaluateCRAAP() {
  const text = document.getElementById("source").value.toLowerCase();

  // --- CURRENCY ---
  let currency = 3;
  if (text.match(/202[3-6]/)) currency = 5;
  else if (text.match(/202[0-2]/)) currency = 4;
  else if (text.match(/201[0-9]/)) currency = 2;
  else currency = 3;

  // --- RELEVANCE ---
  let relevance = 3;
  if (text.includes("study") || text.includes("research")) relevance = 5;
  else if (text.includes("overview") || text.includes("general")) relevance = 3;
  else relevance = 2;

  // --- AUTHORITY ---
  let authority = 3;
  if (text.includes(".edu") || text.includes("journal") || text.includes("university")) authority = 5;
  else if (text.includes("news") || text.includes("bbc") || text.includes("cnn")) authority = 4;
  else if (text.includes("blog") || text.includes("medium")) authority = 2;
  else authority = 3;

  // --- ACCURACY ---
  let accuracy = 3;
  if (text.includes("data") || text.includes("references") || text.includes("doi")) accuracy = 5;
  else if (text.includes("reported") || text.includes("said")) accuracy = 3;
  else accuracy = 2;

  // --- PURPOSE ---
  let purpose = 3;
  if (text.includes("advert") || text.includes("buy") || text.includes("sale")) purpose = 1;
  else if (text.includes("opinion") || text.includes("editorial")) purpose = 2;
  else if (text.includes("report") || text.includes("inform")) purpose = 4;
  else purpose = 3;

  const categories = [
    {
      name: "Currency",
      question: "Is the information current and up to date?",
      score: currency
    },
    {
      name: "Relevance",
      question: "Does this source directly support your research topic?",
      score: relevance
    },
    {
      name: "Authority",
      question: "Who created the source and are they credible?",
      score: authority
    },
    {
      name: "Accuracy",
      question: "Is the information supported by evidence?",
      score: accuracy
    },
    {
      name: "Purpose",
      question: "Why was this source created?",
      score: purpose
    }
  ];

  let html = "";

  for (let c of categories) {
    const result = scoreToResult(c.score);

    html += `
      <div class="box ${result.class}">
        <h3>${c.name}</h3>
        <p class="question">${c.question}</p>

        <p>Score: <strong>${c.score}/5</strong></p>
        <p>Status: ${result.label}</p>
        <p class="small">${result.explanation}</p>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
