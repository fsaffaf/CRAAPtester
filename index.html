
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRAAP Test Analyzer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }
    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    h1, h2 {
      text-align: center;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    textarea {
      height: 200px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>CRAAP Test Analyzer</h1>

  <!-- Research Topic -->
  <label for="topic">Research Topic</label>
  <input type="text" id="topic" name="topic" placeholder="Enter your research topic">

  <!-- Article Information -->
  <h2>Article Information</h2>

  <label for="author">Author Name</label>
  <input type="text" id="author" name="author" placeholder="Enter author's name">

  <label for="date">Date of Publication</label>
  <input type="date" id="date" name="date">

  <label for="publisher">Publisher</label>
  <input type="text" id="publisher" name="publisher" placeholder="e.g., BBC, NY Times, Nature">

  <!-- Full Article -->
  <label for="article">Full Article Text</label>
  <textarea id="article" name="article" placeholder="Paste the full article here..."></textarea>
</div>

</body>

<script>
window.onload = function() {
  const topic = localStorage.getItem("topic");
  const author = localStorage.getItem("author");

  console.log("Topic:", topic);
  console.log("Author:", author);

  // later: run CRAAP analysis here
};
</script>
