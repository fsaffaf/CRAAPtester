<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Test Analyzer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 900px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  /* ✅ FORM GRID */
  .form-group {
    display: grid;
    grid-template-columns: 2fr 4fr;
    align-items: center;
    margin-bottom: 15px;
  }

  label {
    font-weight: bold;
  }


  input[type="text"],
  input[type="date"],
  textarea,
  select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

  textarea {
    resize: vertical;
  }

button {
  width: 50%;
  padding: 12px;
  background: #667eea;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
  margin: 10px auto;   /* ✅ centers horizontally */
  display: block;      /* ✅ required for auto margin */
}

  button:hover {
    background: #5a67d8;
  }

  ::placeholder {
  font-style: italic;
  color: #aaa;
}
</style>
</head>

<body>

<div class="container">
  <h1>CRAAP Test Analyzer</h1>

  <div class="form-group">
  <label>Research Topic Keywords & Synonyms:</label>
  <input 
    type="text" 
    id="topic" 
    placeholder="Teen, adolescent, mental health, psychological disorders, ..."
    required
  >
</div>

  <div class="form-group">
    <label>Article Author(s):</label>
    <input 
      type="text" 
      id="author" 
      placeholder="John Smith, Jane Doe, ..."
      required>
  </div>

<div class="form-group">
  <label>Article Publication Date:</label>
  <div>
    <input 
      type="date" 
      id="date">
    <div style="margin-top: 6px;">
      <label style="font-weight: normal; display: flex; align-items: center; gap: 6px;">
        <input 
          type="checkbox" 
          id="noDate" 
          onclick="toggleDate()"> Click if no date provided
      </label>
    </div>
  </div>
</div>

  <div class="form-group">
    <label>Article Publisher or Website Name:</label>
    <input 
      type="text" 
      id="publisher"
      placeholder="BBC, World Health Organization, New York Times, Journal of Social Psychology, ..."
      required>
  </div>

<div class="form-group">
  <label>Article's Field of Publication:</label>
  <select id="field">

    <optgroup label="STEM Fields">
      <option value="medical">Medical & Health Sciences</option>
      <option value="physics">Physics</option>
      <option value="engineering">Engineering</option>
      <option value="cs">Computer Science</option>
    </optgroup>

    <optgroup label="Social Sciences">
      <option value="psychology">Psychology</option>
      <option value="anthropology">Anthropology</option>
      <option value="economics">Economics</option>
      <option value="political">Political Science</option>
    </optgroup>

    <optgroup label="Humanities">
      <option value="humanities">History, Philosophy, Literature, or Religious Writings</option>
    </optgroup>

    <optgroup label="Applied / Public">
      <option value="news">News & Journalism</option>
      <option value="business">Business & Marketing</option>
      <option value="government">Government & Legal</option>
    </optgroup>

  </select>
</div>
  
  <div class="form-group">
    <label>Full Article Text:</label>
    <textarea
      id="article"
      rows="10"
      placeholder="Copy and paste the full article text here. Include the title, author, and references. There is no character limit."
      required></textarea>
  </div>

  <button onclick="submitData()">Analyze</button>

</div>

<script>
function toggleDate() {
  const dateInput = document.getElementById("date");
  const noDateCheckbox = document.getElementById("noDate");

  if (noDateCheckbox.checked) {
    dateInput.value = "";
    dateInput.disabled = true;
  } else {
    dateInput.disabled = false;
  }
}
  function submitData() {
  const topic = document.getElementById("topic").value;
  const article = document.getElementById("article").value;

  if (!topic || !article) {
    alert("Please fill in Topic and Article.");
    return;
  }
    const noDate = document.getElementById("noDate").checked;

if (noDate) {
  localStorage.setItem("date", "");
} else {
  localStorage.setItem("date", document.getElementById("date").value);
}

  localStorage.setItem("topic", topic);
  localStorage.setItem("author", document.getElementById("author").value);
  localStorage.setItem("publisher", document.getElementById("publisher").value);
  localStorage.setItem("article", article);
  localStorage.setItem("field", document.getElementById("field").value);

  window.location.href = "results.html";
}
</script>

</body>
</html>
