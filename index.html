<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Evidence Analyzer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
  }

  textarea { height: 180px; }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover { background: #1b4fb3; }

  .box {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 6px solid #ccc;
  }

  .pass { border-left-color: green; color: green; }
  .caution { border-left-color: orange; color: orange; }
  .fail { border-left-color: red; color: red; }

  .question { font-style: italic; color: #444; }

  .small { font-size: 0.9em; color: #555; margin-top: 6px; }

  .evidence {
    background: #f8f8f8;
    padding: 8px;
    margin-top: 8px;
    border-left: 4px solid #999;
    font-size: 0.9em;
  }
</style>
</head>

<body>

<h1>CRAAP Evidence Analyzer</h1>

<div class="card">

  <label>Your Research Topic</label>
  <input id="topic" placeholder="e.g., climate change, AI, civil rights..." />

  <label>Field of Study</label>
  <select id="field">
    <option value="science">Science / Medicine</option>
    <option value="technology">Technology</option>
    <option value="social">Social Science</option>
    <option value="humanities">Humanities</option>
    <option value="news">News / Journalism</option>
  </select>

  <label>Paste Full Article Text</label>
  <textarea id="source" placeholder="Paste full article text here..."></textarea>

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Analysis</h2>
  <div id="output"></div>
</div>

<script>

/* -------------------------
   UTIL: SENTENCE MATCHING
-------------------------- */

function getSentences(text) {
  return text.split(/(?<=[.!?])\s+/);
}

function findEvidence(text, keywords = []) {
  const sentences = getSentences(text);
  return sentences.find(s =>
    keywords.some(k => s.toLowerCase().includes(k))
  ) || "No specific supporting sentence detected.";
}

/* -------------------------
   FIELD RULES
-------------------------- */

function getCurrencyRule(field) {
  switch(field) {
    case "technology": return 7;
    case "science": return 10;
    case "social": return 15;
    case "humanities": return 30;
    case "news": return 3;
    default: return 10;
  }
}

/* -------------------------
   YEAR DETECTION
-------------------------- */

function findYear(text) {
  const match = text.match(/\b(19\d{2}|20\d{2})\b/);
  return match ? parseInt(match[0]) : null;
}

/* -------------------------
   AUTHORITY CHECK
-------------------------- */

function detectPublisher(text) {
  const known = {
    "new york times": "highly credible news outlet",
    "washington post": "highly credible news outlet",
    "bbc": "highly credible international news outlet",
    "reuters": "highly credible wire service",
    "associated press": "highly credible wire service"
  };

  for (let key in known) {
    if (text.includes(key)) {
      return { name: key, credibility: known[key] };
    }
  }

  return null;
}

/* -------------------------
   MAIN
-------------------------- */

function evaluateCRAAP() {

  const text = document.getElementById("source").value.toLowerCase();
  const topic = document.getElementById("topic").value.toLowerCase();
  const field = document.getElementById("field").value;

  const year = findYear(text);
  const currentYear = new Date().getFullYear();
  const maxAge = getCurrencyRule(field);

  const publisher = detectPublisher(text);

  const categories = [

    /* ---------------- CURRENCY ---------------- */
    {
      name: "Currency",
      evaluate: () => {

        const evidence = findEvidence(text, ["202", "published", "date"]);

        if (!year) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "No publication year was found in the text, so currency cannot be verified.",
            evidence
          };
        }

        const age = currentYear - year;

        if (age <= maxAge) {
          return {
            status: "PASS",
            class: "pass",
            explanation: `Published in ${year}, which is recent enough for ${field} (acceptable range: ≤${maxAge} years).`,
            evidence
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation: `Published in ${year}, which is too old for ${field} (acceptable range: ≤${maxAge} years).`,
          evidence
        };
      }
    },

    /* ---------------- AUTHORITY ---------------- */
    {
      name: "Authority",
      evaluate: () => {

        const authorMentioned = text.includes("author");

        const evidence = findEvidence(text, ["author", "by"]);

        if (!authorMentioned) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "No specific author is named in the text, which limits the ability to verify credibility.",
            evidence
          };
        }

        if (publisher) {
          return {
            status: "PASS",
            class: "pass",
            explanation: `Author is mentioned and the source is from ${publisher.name}, which is considered a ${publisher.credibility}.`,
            evidence
          };
        }

        return {
          status: "CAUTION",
          class: "caution",
          explanation: "An author is mentioned, but the publication outlet is not clearly identifiable or is not widely recognized.",
          evidence
        };
      }
    },

    /* ---------------- RELEVANCE ---------------- */
    {
      name: "Relevance",
      evaluate: () => {

        const evidence = findEvidence(text, [topic]);

        if (topic && text.includes(topic)) {
          return {
            status: "PASS",
            class: "pass",
            explanation: `The text directly references "${topic}", showing strong relevance.`,
            evidence
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation: "No clear connection between the article and your research topic was found.",
          evidence
        };
      }
    },

    /* ---------------- ACCURACY ---------------- */
    {
      name: "Accuracy",
      evaluate: () => {

        const evidence = findEvidence(text, ["data", "study", "research", "reference", "doi"]);

        if (text.includes("data") || text.includes("study")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The text includes references to data or research, suggesting evidence-based content.",
            evidence
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation: "No clear evidence, citations, or data were found in the text.",
          evidence
        };
      }
    },

    /* ---------------- PURPOSE ---------------- */
    {
      name: "Purpose",
      evaluate: () => {

        const evidence = findEvidence(text, ["buy", "sale", "opinion", "editorial"]);

        if (text.includes("buy") || text.includes("sale")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "The text suggests a commercial purpose (advertising or selling).",
            evidence
          };
        }

        if (text.includes("opinion") || text.includes("editorial")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The text appears opinion-based, which may introduce subjective bias.",
            evidence
          };
        }

        return {
          status: "PASS",
          class: "pass",
          explanation: "The text appears informational in purpose.",
            evidence
        };
      }
    }

  ];

  let html = "";

  for (let c of categories) {
    const result = c.evaluate();

    html += `
      <div class="box ${result.class}">
        <h3>${c.name}</h3>
        <p><strong>${result.status}</strong></p>
        <p class="small">${result.explanation}</p>
        <div class="evidence"><strong>Evidence:</strong><br>${result.evidence}</div>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
