<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Text Analyzer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  textarea {
    width: 100%;
    height: 180px;
    padding: 10px;
    margin-top: 5px;
    font-family: Arial;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover { background: #1b4fb3; }

  .box {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 6px solid #ccc;
  }

  .pass { border-left-color: green; color: green; font-weight: bold; }
  .caution { border-left-color: orange; color: orange; font-weight: bold; }
  .fail { border-left-color: red; color: red; font-weight: bold; }

  .question {
    font-style: italic;
    color: #444;
    margin: 5px 0;
  }

  .small {
    font-size: 0.9em;
    color: #555;
  }
</style>
</head>

<body>

<h1>CRAAP Text Analyzer</h1>

<div class="card">
  <label>Your Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Paste Full Article Text</label>
  <textarea id="source" placeholder="Paste the full article here..."></textarea>

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Analysis</h2>
  <div id="output">Results will appear here.</div>
</div>

<script>
function evaluateCRAAP() {

  const text = document.getElementById("source").value.toLowerCase();

  const findYear = () => {
    const match = text.match(/\b(19\d{2}|20\d{2})\b/);
    return match ? parseInt(match[0]) : null;
  };

  const year = findYear();
  const currentYear = new Date().getFullYear();

  const categories = [

    {
      name: "Currency",
      question: "Is the information current and up to date?",
      evaluate: () => {

        if (!year) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "No publication year was found in the article text, so currency cannot be verified."
          };
        }

        if (year >= currentYear - 3) {
          return {
            status: "PASS",
            class: "pass",
            explanation: `This article was published in ${year}, which is recent and appropriate for most academic research.`
          };
        }

        if (year >= currentYear - 10) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: `This article was published in ${year}, which may still be useful but could be outdated depending on the topic.`
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation: `This article was published in ${year}, which is too old for most modern academic topics such as science and technology.`
        };
      }
    },

    {
      name: "Relevance",
      question: "Does this source support your research topic?",
      evaluate: () => {

        const topic = document.getElementById("topic").value.toLowerCase();

        if (topic && text.includes(topic)) {
          return {
            status: "PASS",
            class: "pass",
            explanation: `The article directly references your topic (“${topic}”), indicating strong relevance.`
          };
        }

        if (text.includes("study") || text.includes("research")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The article contains academic language, but does not clearly match your specific research topic."
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation: "No clear connection between the article content and the stated research topic was detected."
        };
      }
    },

    {
      name: "Authority",
      question: "Who created the source and are they credible?",
      evaluate: () => {

        if (text.includes("university") || text.includes("journal") || text.includes(".edu")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The article references an academic institution or journal, which suggests strong authority."
          };
        }

        if (text.includes("news") || text.includes("bbc") || text.includes("cnn")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The source is a news outlet, which can be credible but may vary in author expertise and depth."
          };
        }

        if (!text.includes("author")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "No author or creator is mentioned in the text, which significantly weakens authority."
          };
        }

        return {
          status: "CAUTION",
          class: "caution",
          explanation: "Some author or source information is present but not enough detail is provided to fully verify credibility."
        };
      }
    },

    {
      name: "Accuracy",
      question: "Is the information supported by evidence?",
      evaluate: () => {

        if (text.includes("doi") || text.includes("references") || text.includes("data")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The article includes references or data, suggesting evidence-based claims."
          };
        }

        if (text.includes("said") || text.includes("reported")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The article contains reported claims but does not clearly show supporting evidence."
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation: "No evidence, citations, or supporting data were found in the article text."
        };
      }
    },

    {
      name: "Purpose",
      question: "Why was this source created?",
      evaluate: () => {

        if (text.includes("buy") || text.includes("sale") || text.includes("advert")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "The article appears to have a commercial purpose, suggesting potential bias toward selling or promotion."
          };
        }

        if (text.includes("opinion") || text.includes("editorial")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The article appears opinion-based, which may introduce subjective bias."
          };
        }

        if (text.includes("report") || text.includes("inform")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The article appears informational in purpose, suggesting an intent to inform rather than persuade."
          };
        }

        return {
          status: "CAUTION",
          class: "caution",
          explanation: "The purpose of the article cannot be clearly determined from the text."
        };
      }
    }

  ];

  let html = "";

  for (let c of categories) {
    const result = c.evaluate();

    html += `
      <div class="box ${result.class}">
        <h3>${c.name}</h3>
        <p class="question">${c.question}</p>
        <p>Status: <strong>${result.status}</strong></p>
        <p class="small">${result.explanation}</p>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
