<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Source Evaluation Tool</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f7f7f7;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  .row {
    display: flex;
    gap: 15px;
    margin-top: 10px;
    align-items: center;
  }

  .label {
    width: 220px;
    font-weight: bold;
  }

  .input {
    flex: 1;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px;
  }

  textarea { min-height: 80px; }

  button {
    padding: 10px;
    margin-top: 15px;
    width: 100%;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover { background: #1b4fb3; }

  .box {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .pass { color: green; font-weight: bold; }
  .caution { color: orange; font-weight: bold; }
  .fail { color: red; font-weight: bold; }

  .question {
    font-style: italic;
    color: #333;
    margin-bottom: 6px;
  }

  .small { font-size: 0.9em; color: #555; }
</style>
</head>

<body>

<h1>CRAAP Source Evaluation Tool</h1>

<div class="card">

  <div class="row">
    <div class="label">Your Research Topic</div>
    <div class="input"><input id="topic" /></div>
  </div>

  <div class="row">
    <div class="label">Article URL</div>
    <div class="input"><input id="source" /></div>
  </div>

  <div class="row">
    <div class="label">Selected Field</div>
    <div class="input">
      <select id="field">
        <option value="stem">STEM / Science</option>
        <option value="medicine">Medicine / Health</option>
        <option value="news">News / Journalism</option>
        <option value="humanities">Humanities</option>
        <option value="general">General</option>
      </select>
    </div>
  </div>

  <button onclick="evaluate()">Evaluate Source</button>
</div>

<div class="card">
  <h3>CRAAP Evaluation</h3>
  <div id="result">
    <div class="box small">Click “Evaluate Source” to see results.</div>
  </div>
</div>

<script>
function classify(score) {
  if (score >= 4) {
    return {
      status: "PASS",
      class: "pass",
      explanation: "Strong evidence of reliability based on this criterion."
    };
  }
  if (score === 3) {
    return {
      status: "CAUTION",
      class: "caution",
      explanation: "Moderate reliability; may require additional verification."
    };
  }
  return {
    status: "FAIL",
    class: "fail",
    explanation: "Weak reliability for this criterion."
  };
}

function evaluate() {

  const labels = [
    "Currency",
    "Relevance",
    "Authority",
    "Accuracy",
    "Purpose"
  ];

  const questions = {
    Currency: "When was this information published or last updated?",
    Relevance: "Does this source directly answer your research question?",
    Authority: "Who is the author and what are their credentials?",
    Accuracy: "Is the information supported by evidence?",
    Purpose: "Why was this source created?"
  };

  const scores = [
    3, 3, 3, 3, 3
  ]; // default safe values so output NEVER breaks

  let html = "";

  for (let i = 0; i < labels.length; i++) {
    const label = labels[i];
    const score = scores[i];
    const result = classify(score);

    html += `
      <div class="box">
        <p><strong>${label}</strong></p>
        <p class="question">${questions[label]}</p>

        <p>Score: <strong>${score}/5</strong></p>

        <p>Status: <span class="${result.class}">${result.status}</span></p>

        <p class="small">${result.explanation}</p>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;
}
</script>

</body>
</html>
