<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Tool (Clean Build)</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 {
    text-align: center;
  }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  button {
    margin-top: 15px;
    width: 100%;
    padding: 10px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .box {
    background: #fff;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 5px solid #ccc;
  }

  .pass { border-left-color: green; color: green; font-weight: bold; }
  .caution { border-left-color: orange; color: orange; font-weight: bold; }
  .fail { border-left-color: red; color: red; font-weight: bold; }

  .question {
    font-style: italic;
    color: #444;
    margin: 5px 0;
  }

  .small {
    font-size: 0.9em;
    color: #555;
  }
</style>
</head>

<body>

<h1>CRAAP Evaluation Tool</h1>

<div class="card">
  <label>Your Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Source Title or URL</label>
  <input id="source" placeholder="Paste article title or URL" />

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Results</h2>
  <div id="output">
    <div class="box">Click “Evaluate Source” to begin.</div>
  </div>
</div>

<script>
function getStatus(score) {
  if (score >= 4) {
    return {
      label: "PASS",
      class: "pass",
      explanation: "Strong evidence of reliability for this category."
    };
  }
  if (score === 3) {
    return {
      label: "CAUTION",
      class: "caution",
      explanation: "Moderate reliability — check additional sources."
    };
  }
  return {
    label: "FAIL",
    class: "fail",
    explanation: "Low reliability for this category."
  };
}

function evaluateCRAAP() {

  const categories = [
    {
      name: "Currency",
      question: "Is the information up to date?"
    },
    {
      name: "Relevance",
      question: "Does this source answer your research question?"
    },
    {
      name: "Authority",
      question: "Who is the author and are they credible?"
    },
    {
      name: "Accuracy",
      question: "Is the information supported by evidence?"
    },
    {
      name: "Purpose",
      question: "Why was this source created?"
    }
  ];

  let html = "";

  for (let i = 0; i < categories.length; i++) {

    // For now we simulate scores (we’ll upgrade this next step)
    let score = 3;

    const result = getStatus(score);

    html += `
      <div class="box ${result.class}">
        <h3>${categories[i].name}</h3>
        <p class="question">${categories[i].question}</p>

        <p>Score: ${score}/5</p>
        <p>Status: ${result.label}</p>
        <p class="small">${result.explanation}</p>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
