<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Test Analyzer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #667eea, #764ba2);
    margin: 0;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
  }

  h1 {
    text-align: center;
    margin-bottom: 20px;
  }

  /* ✅ FORM GRID */
  .form-group {
    display: grid;
    grid-template-columns: 150px 1fr;
    align-items: center;
    margin-bottom: 15px;
  }

  label {
    font-weight: bold;
  }

  input, textarea, select {
    width: 100%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #ccc;
  }

  textarea {
    resize: vertical;
  }

  button {
    width: 100%;
    padding: 12px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
  }

  button:hover {
    background: #5a67d8;
  }
</style>
</head>

<body>

<div class="container">
  <h1>CRAAP Test Analyzer</h1>

  <div class="form-group">
    <label>Topic:</label>
    <input type="text" id="topic">
  </div>

  <div class="form-group">
    <label>Author:</label>
    <input type="text" id="author">
  </div>

  <!-- ✅ DATE MOVED UNDER AUTHOR -->
  <div class="form-group">
    <label>Date:</label>
    <input type="date" id="date">
  </div>

  <div class="form-group">
    <label>Publisher:</label>
    <input type="text" id="publisher">
  </div>

  <div class="form-group">
    <label>Field:</label>
    <select id="field">
      <option value="stem">Sciences (STEM/Medicine)</option>
      <option value="social">Social Sciences</option>
      <option value="humanities">Humanities</option>
      <option value="business">Business & Industry</option>
      <option value="news">News & General</option>
    </select>
  </div>

  <div class="form-group">
    <label>Article:</label>
    <textarea id="article" rows="6"></textarea>
  </div>

  <button onclick="submitData()">Analyze</button>

</div>

<script>
function submitData() {
  const topic = document.getElementById("topic").value;
  const article = document.getElementById("article").value;

  if (!topic || !article) {
    alert("Please fill in Topic and Article.");
    return;
  }

  localStorage.setItem("topic", topic);
  localStorage.setItem("author", document.getElementById("author").value);
  localStorage.setItem("date", document.getElementById("date").value);
  localStorage.setItem("publisher", document.getElementById("publisher").value);
  localStorage.setItem("article", article);
  localStorage.setItem("field", document.getElementById("field").value);

  window.location.href = "results.html";
}
</script>

</body>
</html>
