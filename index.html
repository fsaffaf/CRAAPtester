<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Auto-Evaluator</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .box {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 6px solid #ccc;
  }

  .pass { border-left-color: green; color: green; font-weight: bold; }
  .caution { border-left-color: orange; color: orange; font-weight: bold; }
  .fail { border-left-color: red; color: red; font-weight: bold; }

  .question {
    font-style: italic;
    color: #444;
    margin: 5px 0;
  }

  .small {
    font-size: 0.9em;
    color: #555;
  }
</style>
</head>

<body>

<h1>CRAAP Auto-Evaluator</h1>

<div class="card">
  <label>Your Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Article Title / URL / Text</label>
  <input id="source" placeholder="Paste article title or URL" />

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Analysis</h2>
  <div id="output">
    <div class="box small">Results will appear here after evaluation.</div>
  </div>
</div>

<script>
function evaluateCRAAP() {
  const text = document.getElementById("source").value.toLowerCase();

  const categories = [
    {
      name: "Currency",
      question: "Is the information current and up to date?",
      evaluate: () => {
        if (text.match(/202[3-6]/)) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "A recent publication year is detected, suggesting up-to-date information."
          };
        } else if (text.match(/201[0-9]|202[0-2]/)) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The source appears older, which may reduce reliability depending on the topic."
          };
        } else {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "No clear publication date was detected, so currency cannot be verified."
          };
        }
      }
    },

    {
      name: "Relevance",
      question: "Does this source directly support your research topic?",
      evaluate: () => {
        if (text.includes("study") || text.includes("research")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The source contains indicators of academic or research relevance."
          };
        } else if (text.includes("overview") || text.includes("general")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The source appears general and may only partially address the research question."
          };
        } else {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "No strong indicators of direct relevance to an academic research question were found."
          };
        }
      }
    },

    {
      name: "Authority",
      question: "Who created the source and are they credible?",
      evaluate: () => {
        if (text.includes(".edu") || text.includes("journal") || text.includes("university")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The source is associated with an academic or institutional domain, suggesting strong authority."
          };
        } else if (text.includes("bbc") || text.includes("cnn") || text.includes("news")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The source is a media outlet, which may be credible but can vary in author expertise."
          };
        } else if (text.includes("blog") || text.includes("medium")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "The source appears to be a blog platform with unclear author credentials."
          };
        } else {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "No clear author or institutional affiliation was detected."
          };
        }
      }
    },

    {
      name: "Accuracy",
      question: "Is the information supported by evidence?",
      evaluate: () => {
        if (text.includes("doi") || text.includes("references") || text.includes("data")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The source references data or citations, suggesting evidence-based content."
          };
        } else if (text.includes("said") || text.includes("reported")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The source includes reported claims but lacks clear supporting citations."
          };
        } else {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "No evidence or citations were detected to support claims."
          };
        }
      }
    },

    {
      name: "Purpose",
      question: "Why was this source created?",
      evaluate: () => {
        if (text.includes("advert") || text.includes("buy") || text.includes("sale")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation: "The source appears to have a commercial intent."
          };
        } else if (text.includes("opinion") || text.includes("editorial")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The source contains opinion-based content, which may introduce bias."
          };
        } else if (text.includes("report") || text.includes("inform")) {
          return {
            status: "PASS",
            class: "pass",
            explanation: "The source appears to have an informational purpose."
          };
        } else {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "The purpose of the source is unclear from available signals."
          };
        }
      }
    }
  ];

  let html = "";

  for (let c of categories) {
    const result = c.evaluate();

    html += `
      <div class="box ${result.class}">
        <h3>${c.name}</h3>
        <p class="question">${c.question}</p>
        <p>Status: <strong>${result.status}</strong></p>
        <p class="small">${result.explanation}</p>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
