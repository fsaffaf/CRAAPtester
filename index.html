<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Tester (Full Evaluation)</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f7f7f7;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  button {
    padding: 10px;
    margin-top: 15px;
    width: 100%;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .score {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
  }

  .pass { color: green; }
  .fail { color: red; }
  .borderline { color: orange; }

  .box {
    background: #fff;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .small {
    font-size: 0.9em;
    color: #555;
  }

  .warning {
    color: #b45309;
    font-weight: bold;
  }

  .good {
    color: green;
    font-weight: bold;
  }
</style>
</head>

<body>

<h1>CRAAP Source Evaluation Tool</h1>

<div class="card">
  <label>Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Source Title / URL</label>
  <input id="source" placeholder="Paste article title or URL" />

  <label>Field</label>
  <select id="field">
    <option value="stem">STEM / Science</option>
    <option value="humanities">Humanities</option>
    <option value="news">News / Journalism</option>
    <option value="medicine">Medicine / Health</option>
    <option value="general">General</option>
  </select>
</div>

<div class="card">
  <h3>CRAAP Scores (1–5)</h3>

  <label>Currency</label>
  <input type="number" id="currency" min="1" max="5" value="3"/>

  <label>Relevance</label>
  <input type="number" id="relevance" min="1" max="5" value="3"/>

  <label>Authority</label>
  <input type="number" id="authority" min="1" max="5" value="3"/>

  <label>Accuracy</label>
  <input type="number" id="accuracy" min="1" max="5" value="3"/>

  <label>Purpose</label>
  <input type="number" id="purpose" min="1" max="5" value="3"/>

  <button onclick="evaluate()">Evaluate Source</button>

  <div id="result" class="score"></div>
</div>

<div class="card">
  <h3>Article Breakdown</h3>

  <label>Author</label>
  <input id="author" placeholder="Author name(s)" />

  <label>Publication Date (Year)</label>
  <input id="year" type="number" placeholder="e.g. 2023" />

  <label>Publication Outlet</label>
  <input id="outlet" placeholder="Journal, website, newspaper, etc." />

  <label>Summary of Article</label>
  <textarea id="summary" placeholder="Brief summary of the article..."></textarea>

  <div id="metaFeedback" class="small"></div>
</div>

<script>
function yearRules(field) {
  return {
    stem: "STEM sources should generally be within the last 5–7 years.",
    medicine: "Medical sources should ideally be within the last 3–5 years.",
    news: "News sources should typically be within the last 1–2 years.",
    humanities: "Humanities sources can be valid even if 10–20+ years old.",
    general: "General sources should preferably be within the last 5–10 years."
  }[field];
}

function yearCheck(field, year) {
  const current = new Date().getFullYear();

  if (!year) return "No publication year provided.";

  const age = current - year;

  switch (field) {
    case "stem":
      return age <= 7
        ? "✔ Acceptable for STEM (within 5–7 year range guideline)."
        : "⚠ Potentially outdated for STEM.";

    case "medicine":
      return age <= 5
        ? "✔ Acceptable for medical research (3–5 year guideline)."
        : "⚠ Possibly outdated for medical context.";

    case "news":
      return age <= 2
        ? "✔ Acceptable for journalism (1–2 year guideline)."
        : "⚠ Likely outdated for news reporting.";

    case "humanities":
      return "✔ Humanities sources can remain valid even if older; evaluate context.";

    case "general":
      return age <= 10
        ? "✔ Acceptable general timeframe."
        : "⚠ Possibly outdated depending on topic.";

    default:
      return "";
  }
}

function evaluate() {
  const labels = ["Currency", "Relevance", "Authority", "Accuracy", "Purpose"];

  const scores = [
    +document.getElementById("currency").value,
    +document.getElementById("relevance").value,
    +document.getElementById("authority").value,
    +document.getElementById("accuracy").value,
    +document.getElementById("purpose").value
  ];

  let total = 0;

  for (let s of scores) total += s / 5; // normalize equally

  let status = "";
  let cls = "";

  if (total >= 4) {
    status = "PASS ✔";
    cls = "pass";
  } else if (total >= 3) {
    status = "BORDERLINE ⚠";
    cls = "borderline";
  } else {
    status = "FAIL ✖";
    cls = "fail";
  }

  document.getElementById("result").className = "score " + cls;
  document.getElementById("result").innerHTML =
    `Overall Score: ${total.toFixed(2)} / 5 — ${status}`;

  // ARTICLE METADATA
  const field = document.getElementById("field").value;
  const year = +document.getElementById("year").value;

  const metaHTML = `
    <div class="box">
      <p><strong>Author:</strong> ${document.getElementById("author").value || "Not provided"}</p>
      <p><strong>Publication Year:</strong> ${year || "Not provided"}</p>
      <p><strong>Publication Outlet:</strong> ${document.getElementById("outlet").value || "Not provided"}</p>
      <p><strong>Summary:</strong> ${document.getElementById("summary").value || "Not provided"}</p>
    </div>

    <div class="box">
      <p><strong>Field Guidance:</strong> ${yearRules(field)}</p>
      <p class="warning"><strong>Year Evaluation:</strong> ${yearCheck(field, year)}</p>
    </div>
  `;

  document.getElementById("metaFeedback").innerHTML = metaHTML;
}
</script>

</body>
</html>
