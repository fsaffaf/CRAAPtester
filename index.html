<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Tester (Independent Evaluation)</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f7f7f7;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  textarea {
    min-height: 80px;
  }

  button {
    padding: 10px;
    margin-top: 15px;
    width: 100%;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .box {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .pass { color: green; font-weight: bold; }
  .caution { color: orange; font-weight: bold; }
  .fail { color: red; font-weight: bold; }

  .question {
    font-style: italic;
    color: #333;
    margin-bottom: 6px;
  }

  .small { font-size: 0.9em; color: #555; }
</style>
</head>

<body>

<h1>CRAAP Source Evaluation Tool</h1>

<div class="card">
  <label>Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Source Title / URL / Snippet</label>
  <input id="source" placeholder="Paste title, URL, or excerpt" oninput="suggestField()" />

  <label>Suggested Field</label>
  <div id="suggestion" class="small"></div>

  <label>Selected Field (editable)</label>
  <select id="field">
    <option value="stem">STEM / Science</option>
    <option value="medicine">Medicine / Health</option>
    <option value="news">News / Journalism</option>
    <option value="humanities">Humanities</option>
    <option value="general">General</option>
  </select>
</div>

<div class="card">
  <h3>CRAAP Evaluation (Independent Categories)</h3>

  <button onclick="evaluate()">Evaluate Source</button>

  <div id="result"></div>
</div>

<div class="card">
  <h3>Article Breakdown</h3>

  <label>Author</label>
  <input id="author" />

  <label>Publication Year</label>
  <input id="year" type="number" />

  <label>Publication Outlet</label>
  <input id="outlet" />

  <label>Summary</label>
  <textarea id="summary"></textarea>

  <div id="meta"></div>
</div>

<script>
function detectField(text) {
  text = text.toLowerCase();

  const rules = {
    stem: ["study", "experiment", "data", "journal", "research", "physics", "chemistry", "biology", "algorithm"],
    medicine: ["clinical", "patient", "trial", "health", "medical", "hospital", "treatment", "disease"],
    news: ["breaking", "report", "cnn", "bbc", "article", "today", "press", "news"],
    humanities: ["history", "philosophy", "literature", "culture", "essay", "analysis", "civilization"]
  };

  let best = "general";
  let bestScore = 0;

  for (let f in rules) {
    let score = 0;
    for (let k of rules[f]) {
      if (text.includes(k)) score++;
    }
    if (score > bestScore) {
      bestScore = score;
      best = f;
    }
  }

  return best;
}

function suggestField() {
  const text = document.getElementById("source").value;
  if (!text.trim()) return;

  const field = detectField(text);

  document.getElementById("suggestion").innerHTML =
    `Suggested: <strong>${field.toUpperCase()}</strong> (you may override)`;

  document.getElementById("field").value = field;
}

function classify(score) {
  if (score >= 4) return { status: "PASS", color: "pass", reason: "Strong evidence of reliability." };
  if (score === 3) return { status: "CAUTION", color: "caution", reason: "Moderate reliability; verify supporting evidence." };
  return { status: "FAIL", color: "fail", reason: "Weak or unreliable indicator." };
}

function evaluate() {
  const labels = ["Currency", "Relevance", "Authority", "Accuracy", "Purpose"];

  const questions = {
    Currency: "When was this information published or last updated?",
    Relevance: "Does this source directly help answer your research question?",
    Authority: "Who is the author and what are their credentials or expertise?",
    Accuracy: "Is the information supported by evidence or verifiable sources?",
    Purpose: "Why was this source created (inform, persuade, sell, entertain)?"
  };

  const scores = [
    +document.getElementById("currency").value,
    +document.getElementById("relevance").value,
    +document.getElementById("authority").value,
    +document.getElementById("accuracy").value,
    +document.getElementById("purpose").value
  ];

  const field = document.getElementById("field").value;

  let html = "<h3>CRAAP Breakdown</h3>";

  for (let i = 0; i < labels.length; i++) {
    const label = labels[i];
    const result = classify(scores[i]);

    html += `
      <div class="box">
        <p><strong>${label}</strong></p>
        <p class="question">${questions[label]}</p>
        <p>Score: <strong>${scores[i]}/5</strong></p>
        <p>Status: <span class="${result.color}">${result.status}</span></p>
        <p class="small">${result.reason}</p>
      </div>
    `;
  }

  document.getElementById("result").innerHTML = html;

  document.getElementById("meta").innerHTML = `
    <div class="box">
      <p><strong>Author:</strong> ${document.getElementById("author").value || "Not provided"}</p>
      <p><strong>Year:</strong> ${document.getElementById("year").value || "Not provided"}</p>
      <p><strong>Outlet:</strong> ${document.getElementById("outlet").value || "Not provided"}</p>
      <p><strong>Summary:</strong> ${document.getElementById("summary").value || "Not provided"}</p>
    </div>

    <div class="box">
      <p><strong>Selected Field:</strong> ${field.toUpperCase()}</p>
      <p class="small">Use these evaluations to decide whether the source is appropriate, and explain your reasoning in your work.</p>
    </div>
  `;
}
</script>

</body>
</html>
