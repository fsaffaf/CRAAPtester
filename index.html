<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Evidence Analyzer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
  }

  textarea {
    height: 180px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover { background: #1b4fb3; }

  .box {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 6px solid #ccc;
  }

  .pass { border-left-color: green; color: green; }
  .caution { border-left-color: orange; color: orange; }
  .fail { border-left-color: red; color: red; }

  .question {
    font-style: italic;
    color: #444;
  }

  .small {
    font-size: 0.9em;
    color: #555;
    margin-top: 6px;
  }

  .evidence {
    background: #f8f8f8;
    padding: 8px;
    margin-top: 8px;
    border-left: 4px solid #999;
    font-size: 0.9em;
  }
</style>
</head>

<body>

<h1>CRAAP Evidence Analyzer</h1>

<div class="card">

  <label>Your Research Topic</label>
  <input id="topic" placeholder="e.g., climate change, AI, civil rights..." />

  <!-- PUBLICATION FIELD -->
  <label>Publication Field (field the article was written in)</label>

  <p class="small">
    Select the field that best describes how the article was written (not your research topic).
    This affects how CRAAP rules are applied.
  </p>

  <select id="field">
    <option value="science">Science / Medicine (clinical studies, lab research)</option>
    <option value="technology">Technology (AI, computing, engineering, software)</option>
    <option value="social">Social Science (psychology, sociology, economics)</option>
    <option value="humanities">Humanities (history, philosophy, literature)</option>
    <option value="news">News / Journalism (reporting, media articles)</option>
  </select>

  <span id="suggestedField" style="color:red; font-weight:bold; display:block; margin-top:5px;"></span>

  <label>Paste Full Article Text</label>
  <textarea id="source" placeholder="Paste full article text here..."></textarea>

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Analysis</h2>
  <div id="output"></div>
</div>

<script>

/* -------------------------
   FIELD SUGGESTION ENGINE
-------------------------- */

function suggestField(text) {
  text = text.toLowerCase();

  if (text.includes("clinical") || text.includes("trial") || text.includes("patient") || text.includes("study")) {
    return "science";
  }

  if (text.includes("algorithm") || text.includes("software") || text.includes("ai") || text.includes("computer")) {
    return "technology";
  }

  if (text.includes("survey") || text.includes("society") || text.includes("economic") || text.includes("behavior")) {
    return "social";
  }

  if (text.includes("history") || text.includes("philosophy") || text.includes("literature")) {
    return "humanities";
  }

  if (text.includes("reported") || text.includes("journalist") || text.includes("breaking") || text.includes("said")) {
    return "news";
  }

  return null;
}

/* -------------------------
   SENTENCE EVIDENCE
-------------------------- */

function getSentences(text) {
  return text.split(/(?<=[.!?])\s+/);
}

function findEvidence(text, keywords = []) {
  const sentences = getSentences(text);
  return sentences.find(s =>
    keywords.some(k => s.toLowerCase().includes(k))
  ) || "No specific sentence detected.";
}

/* -------------------------
   YEAR DETECTION
-------------------------- */

function findYear(text) {
  const match = text.match(/\b(19\d{2}|20\d{2})\b/);
  return match ? parseInt(match[0]) : null;
}

/* -------------------------
   CREDIBLE SOURCE CHECK
-------------------------- */

function detectPublisher(text) {
  const known = {
    "new york times": "highly credible news outlet",
    "washington post": "highly credible news outlet",
    "bbc": "highly credible international news outlet",
    "reuters": "highly credible wire service",
    "associated press": "highly credible wire service"
  };

  for (let key in known) {
    if (text.includes(key)) {
      return { name: key, credibility: known[key] };
    }
  }

  return null;
}

/* -------------------------
   MAIN FUNCTION
-------------------------- */

function evaluateCRAAP() {

  const text = document.getElementById("source").value.toLowerCase();
  const topic = document.getElementById("topic").value.toLowerCase();
  const field = document.getElementById("field").value;

  const suggested = suggestField(text);
  const suggestedBox = document.getElementById("suggestedField");

  if (suggested) {
    suggestedBox.innerText = "Suggested field: " + suggested.toUpperCase();
    document.getElementById("field").value = suggested;
  } else {
    suggestedBox.innerText = "";
  }

  const year = findYear(text);
  const currentYear = new Date().getFullYear();

  const maxAge = {
    technology: 7,
    science: 10,
    social: 15,
    humanities: 30,
    news: 3
  }[field];

  const publisher = detectPublisher(text);

  const categories = [

    /* ---------------- CURRENCY ---------------- */
    {
      name: "Currency",
      evaluate: () => {

        const evidence = findEvidence(text, ["202", "published", "date"]);

        if (!year) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation: "No publication year found in text, so currency cannot be verified.",
            evidence
          };
        }

        const age = currentYear - year;

        if (age <= maxAge) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              `Published in ${year}. In ${field}, sources within ~${maxAge} years are considered acceptable.`,
            evidence
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation:
            `Published in ${year}. This is ${age} years old, which exceeds the acceptable range for ${field} (~${maxAge} years).`,
          evidence
        };
      }
    },

    /* ---------------- AUTHORITY ---------------- */
    {
      name: "Authority",
      evaluate: () => {

        const evidence = findEvidence(text, ["author", "by"]);

        const hasAuthor = text.includes("author");

        if (!hasAuthor) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              "No specific author is named. This limits accountability and credibility verification.",
            evidence
          };
        }

        if (publisher) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              `Author is present and source is from ${publisher.name}, which is considered a ${publisher.credibility}.`,
            evidence
          };
        }

        return {
          status: "CAUTION",
          class: "caution",
          explanation:
            "Author is present, but publication source is not clearly identifiable or widely recognized.",
          evidence
        };
      }
    },

    /* ---------------- RELEVANCE ---------------- */
    {
      name: "Relevance",
      evaluate: () => {

        const evidence = findEvidence(text, [topic]);

        if (topic && text.includes(topic)) {
          return {
            status: "PASS",
            class: "pass",
            explanation: `Direct reference to "${topic}" found in the text.`,
            evidence
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation:
            "No clear connection between article content and research topic was found.",
          evidence
        };
      }
    },

    /* ---------------- ACCURACY ---------------- */
    {
      name: "Accuracy",
      evaluate: () => {

        const evidence = findEvidence(text, ["data", "study", "research", "doi"]);

        if (text.includes("data") || text.includes("study")) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              "The text includes references to data or research, indicating evidence-based claims.",
            evidence
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation:
            "No supporting data, citations, or references were found.",
          evidence
        };
      }
    },

    /* ---------------- PURPOSE ---------------- */
    {
      name: "Purpose",
      evaluate: () => {

        const evidence = findEvidence(text, ["buy", "sale", "opinion", "editorial"]);

        if (text.includes("buy") || text.includes("sale")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation:
              "Commercial intent detected (advertising or selling content).",
            evidence
          };
        }

        if (text.includes("opinion") || text.includes("editorial")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              "Opinion-based content detected, which may introduce bias.",
            evidence
          };
        }

        return {
          status: "PASS",
          class: "pass",
          explanation:
            "Informational intent detected.",
          evidence
        };
      }
    }

  ];

  let html = "";

  for (let c of categories) {
    const result = c.evaluate();

    html += `
      <div class="box ${result.class}">
        <h3>${c.name}</h3>
        <p><strong>${result.status}</strong></p>
        <p class="small">${result.explanation}</p>
        <div class="evidence"><strong>Evidence:</strong><br>${result.evidence}</div>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
