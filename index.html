<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Field-Aware Analyzer</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f4f4f4;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 12px 0;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
  }

  textarea {
    height: 180px;
  }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  button:hover { background: #1b4fb3; }

  .box {
    background: white;
    padding: 12px;
    margin-top: 10px;
    border-radius: 8px;
    border-left: 6px solid #ccc;
  }

  .pass { border-left-color: green; color: green; }
  .caution { border-left-color: orange; color: orange; }
  .fail { border-left-color: red; color: red; }

  .question {
    font-style: italic;
    color: #444;
  }

  .small {
    font-size: 0.9em;
    color: #555;
    margin-top: 6px;
  }
</style>
</head>

<body>

<h1>CRAAP Field-Aware Analyzer</h1>

<div class="card">

  <label>Your Research Topic</label>
  <input id="topic" placeholder="e.g., climate change, AI, civil rights..." />

  <label>Field of Study</label>
  <select id="field">
    <option value="science">Science / Medicine</option>
    <option value="technology">Technology</option>
    <option value="social">Social Science</option>
    <option value="humanities">Humanities</option>
    <option value="news">News / Journalism</option>
  </select>

  <label>Paste Full Article Text</label>
  <textarea id="source" placeholder="Paste full article text here..."></textarea>

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>CRAAP Analysis</h2>
  <div id="output">Results will appear here.</div>
</div>

<script>

/* -------------------------
   FIELD RULES (CRITICAL)
-------------------------- */

function getCurrencyRule(field) {
  switch(field) {
    case "technology":
      return { max: 7, note: "Technology evolves rapidly." };
    case "science":
    case "medicine":
      return { max: 10, note: "Scientific research remains relevant longer but still evolves." };
    case "social":
      return { max: 15, note: "Social trends evolve more slowly than tech/science." };
    case "humanities":
      return { max: 30, note: "Historical and philosophical sources remain relevant longer." };
    case "news":
      return { max: 3, note: "News must be extremely recent to remain relevant." };
    default:
      return { max: 10, note: "General academic standard." };
  }
}

/* -------------------------
   YEAR DETECTION
-------------------------- */

function findYear(text) {
  const match = text.match(/\b(19\d{2}|20\d{2})\b/);
  return match ? parseInt(match[0]) : null;
}

/* -------------------------
   MAIN EVALUATION
-------------------------- */

function evaluateCRAAP() {

  const text = document.getElementById("source").value.toLowerCase();
  const topic = document.getElementById("topic").value.toLowerCase();
  const field = document.getElementById("field").value;

  const year = findYear(text);
  const currentYear = new Date().getFullYear();

  const rule = getCurrencyRule(field);

  const categories = [

    {
      name: "Currency",
      question: "Is the information current for this field?",
      evaluate: () => {

        if (!year) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              `No publication year was found in the text. Without a date, we cannot verify whether the source meets the currency expectations for ${field}.`
          };
        }

        const age = currentYear - year;

        if (age <= rule.max) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              `This article was published in ${year}. That is ${age} years old, which is acceptable for ${field}. ${rule.note}`
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation:
            `This article was published in ${year}, making it ${age} years old. In ${field}, sources should generally be within ${rule.max} years. ${rule.note} This makes the source too outdated.`
        };
      }
    },

    {
      name: "Relevance",
      question: "Does this source match your research topic?",
      evaluate: () => {

        if (topic && text.includes(topic)) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              `The text directly mentions "${topic}", showing strong alignment with your research topic.`
          };
        }

        if (text.includes("study") || text.includes("research")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              "The text includes academic language, but does not clearly match your specific topic."
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation:
            "No clear connection between the article content and your research topic was found."
        };
      }
    },

    {
      name: "Authority",
      question: "Who wrote this and can they be trusted?",
      evaluate: () => {

        if (text.includes("university") || text.includes(".edu") || text.includes("journal")) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              "The source references an academic institution or peer-reviewed journal, which is a strong indicator of authority."
          };
        }

        if (text.includes("news") || text.includes("bbc") || text.includes("cnn")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              "The source is from a news organization. These can be credible, but author expertise varies."
          };
        }

        if (!text.includes("author")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation:
              "No author is identified in the text. Without an author, credibility cannot be verified."
          };
        }

        return {
          status: "CAUTION",
          class: "caution",
          explanation:
            "Some authorship information exists, but it is not detailed enough to fully assess credibility."
          };
      }
    },

    {
      name: "Accuracy",
      question: "Is the information supported by evidence?",
      evaluate: () => {

        if (text.includes("doi") || text.includes("references") || text.includes("data")) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              "The article includes references or data, which supports evidence-based claims."
          };
        }

        if (text.includes("said") || text.includes("reported")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              "The article includes reported claims but does not clearly show supporting evidence or citations."
          };
        }

        return {
          status: "FAIL",
          class: "fail",
          explanation:
            "No citations, references, or supporting evidence were found in the text."
        };
      }
    },

    {
      name: "Purpose",
      question: "Why was this source created?",
      evaluate: () => {

        if (text.includes("buy") || text.includes("sale") || text.includes("advert")) {
          return {
            status: "FAIL",
            class: "fail",
            explanation:
              "The text suggests a commercial purpose (advertising or selling), which introduces bias."
          };
        }

        if (text.includes("opinion") || text.includes("editorial")) {
          return {
            status: "CAUTION",
            class: "caution",
            explanation:
              "The source appears opinion-based, which may reflect subjective interpretation rather than objective reporting."
          };
        }

        if (text.includes("report") || text.includes("inform")) {
          return {
            status: "PASS",
            class: "pass",
            explanation:
              "The source appears informational in purpose, aiming to report or explain rather than persuade."
          };
        }

        return {
          status: "CAUTION",
          class: "caution",
          explanation:
            "The purpose of the source cannot be clearly determined from the available text."
        };
      }
    }

  ];

  let html = "";

  for (let c of categories) {
    const result = c.evaluate();

    html += `
      <div class="box ${result.class}">
        <h3>${c.name}</h3>
        <p class="question">${c.question}</p>
        <p><strong>${result.status}</strong></p>
        <p class="small">${result.explanation}</p>
      </div>
    `;
  }

  document.getElementById("output").innerHTML = html;
}
</script>

</body>
</html>
