<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Tester (Explained)</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f7f7f7;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  button {
    padding: 10px;
    margin-top: 15px;
    width: 100%;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .score {
    font-size: 20px;
    font-weight: bold;
    margin-top: 10px;
  }

  .pass { color: green; }
  .fail { color: red; }
  .borderline { color: orange; }

  .breakdown {
    margin-top: 20px;
  }

  .item {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .small {
    font-size: 0.9em;
    color: #444;
  }
</style>
</head>

<body>

<h1>CRAAP Test Evaluator (Explained)</h1>

<div class="card">
  <label>Source (URL or Title)</label>
  <input id="source" placeholder="Paste a URL or article title"/>

  <label>Field</label>
  <select id="field">
    <option value="stem">STEM / Science</option>
    <option value="humanities">Humanities</option>
    <option value="news">News / Journalism</option>
    <option value="medicine">Medicine / Health</option>
    <option value="general">General</option>
  </select>
</div>

<div class="card">
  <h3>CRAAP Scores (1–5)</h3>

  <label>Currency</label>
  <input type="number" id="currency" min="1" max="5" value="3"/>

  <label>Relevance</label>
  <input type="number" id="relevance" min="1" max="5" value="3"/>

  <label>Authority</label>
  <input type="number" id="authority" min="1" max="5" value="3"/>

  <label>Accuracy</label>
  <input type="number" id="accuracy" min="1" max="5" value="3"/>

  <label>Purpose</label>
  <input type="number" id="purpose" min="1" max="5" value="3"/>

  <button onclick="calculate()">Run CRAAP Test</button>

  <div id="result" class="score"></div>
</div>

<div id="breakdown" class="breakdown"></div>

<script>
function getWeights(field) {
  const profiles = {
    stem:      [0.30, 0.15, 0.20, 0.30, 0.05],
    humanities:[0.15, 0.25, 0.20, 0.20, 0.20],
    news:      [0.35, 0.10, 0.25, 0.20, 0.10],
    medicine:  [0.20, 0.10, 0.25, 0.35, 0.10],
    general:   [0.20, 0.20, 0.20, 0.20, 0.20]
  };
  return profiles[field];
}

function explain(label, score) {
  const map = {
    Currency: [
      "Very recent or frequently updated.",
      "Mostly recent with minor lag.",
      "Somewhat dated but usable.",
      "Outdated for fast-moving topics.",
      "Very outdated or irrelevant timing."
    ],
    Relevance: [
      "Directly answers the research question.",
      "Mostly relevant with small gaps.",
      "Moderately relevant.",
      "Weak connection to topic.",
      "Not relevant."
    ],
    Authority: [
      "Highly credible expert or institution.",
      "Trusted source with minor uncertainty.",
      "Some authority but unclear credentials.",
      "Weak or questionable authority.",
      "No identifiable authority."
    ],
    Accuracy: [
      "Well-supported with strong evidence.",
      "Mostly accurate.",
      "Some questionable claims.",
      "Weak or poorly supported.",
      "Inaccurate or unsupported."
    ],
    Purpose: [
      "Neutral, informative purpose.",
      "Mostly objective.",
      "Mixed intent.",
      "Some bias or persuasion.",
      "Highly biased or promotional."
    ]
  };

  return map[label][score - 1];
}

function level(score) {
  if (score >= 4) return "Strong";
  if (score >= 3) return "Moderate";
  if (score >= 2) return "Weak";
  return "Poor";
}

function calculate() {
  const labels = ["Currency", "Relevance", "Authority", "Accuracy", "Purpose"];

  const scores = [
    +document.getElementById("currency").value,
    +document.getElementById("relevance").value,
    +document.getElementById("authority").value,
    +document.getElementById("accuracy").value,
    +document.getElementById("purpose").value
  ];

  const field = document.getElementById("field").value;
  const weights = getWeights(field);

  let total = 0;

  let html = "<h2>CRAAP Breakdown</h2>";

  for (let i = 0; i < labels.length; i++) {
    const contribution = scores[i] * weights[i];
    total += contribution;

    html += `
      <div class="item">
        <h3>${labels[i]} — ${scores[i]}/5</h3>
        <p><strong>Level:</strong> ${level(scores[i])}</p>
        <p><strong>Why this score:</strong> ${explain(labels[i], scores[i])}</p>
        <p class="small"><strong>Weighted contribution:</strong> ${contribution.toFixed(2)}</p>
      </div>
    `;
  }

  let status = "";
  let cls = "";

  if (total >= 3.5) {
    status = "PASS ✔";
    cls = "pass";
  } else if (total >= 2.5) {
    status = "BORDERLINE ⚠";
    cls = "borderline";
  } else {
    status = "FAIL ✖";
    cls = "fail";
  }

  document.getElementById("result").className = "score " + cls;
  document.getElementById("result").innerHTML =
    `Final Score: ${total.toFixed(2)} / 5 — ${status}`;

  document.getElementById("breakdown").innerHTML = html;
}
</script>

</body>
</html>
