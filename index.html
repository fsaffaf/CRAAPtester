<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP Tester (Suggested Field Override)</title>

<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    background: #f7f7f7;
  }

  h1 { text-align: center; }

  .card {
    background: white;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
  }

  label {
    font-weight: bold;
    display: block;
    margin-top: 10px;
  }

  input, select, textarea {
    width: 100%;
    padding: 8px;
    margin-top: 5px;
  }

  textarea {
    min-height: 80px;
  }

  button {
    padding: 10px;
    margin-top: 15px;
    width: 100%;
    background: #2d6cdf;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
  }

  button:hover {
    background: #1b4fb3;
  }

  .box {
    background: white;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
  }

  .pass { color: green; font-weight: bold; }
  .caution { color: orange; font-weight: bold; }
  .fail { color: red; font-weight: bold; }

  .small { font-size: 0.9em; color: #555; }
</style>
</head>

<body>

<h1>CRAAP Source Evaluator</h1>

<div class="card">
  <label>Research Topic</label>
  <input id="topic" placeholder="What are you researching?" />

  <label>Source Title / URL / Snippet</label>
  <input id="source" placeholder="Paste title, URL, or excerpt" oninput="suggestField()" />

  <label>Suggested Field (auto-detected)</label>
  <div id="suggestion" class="small"></div>

  <label>Selected Field (editable)</label>
  <select id="field">
    <option value="stem">STEM / Science</option>
    <option value="medicine">Medicine / Health</option>
    <option value="news">News / Journalism</option>
    <option value="humanities">Humanities</option>
    <option value="general">General</option>
  </select>
</div>

<div class="card">
  <h3>CRAAP Ratings (1–5)</h3>

  <label>Currency</label>
  <input type="number" id="currency" min="1" max="5" value="3"/>

  <label>Relevance</label>
  <input type="number" id="relevance" min="1" max="5" value="3"/>

  <label>Authority</label>
  <input type="number" id="authority" min="1" max="5" value="3"/>

  <label>Accuracy</label>
  <input type="number" id="accuracy" min="1" max="5" value="3"/>

  <label>Purpose</label>
  <input type="number" id="purpose" min="1" max="5" value="3"/>

  <button onclick="evaluate()">Evaluate Source</button>

  <div id="result"></div>
</div>

<div class="card">
  <h3>Article Breakdown</h3>

  <label>Author</label>
  <input id="author" />

  <label>Publication Year</label>
  <input id="year" type="number" />

  <label>Publication Outlet</label>
  <input id="outlet" />

  <label>Summary</label>
  <textarea id="summary"></textarea>

  <div id="meta"></div>
</div>

<script>
function detectField(text) {
  text = text.toLowerCase();

  const rules = {
    stem: ["study", "experiment", "data", "journal", "research", "physics", "chemistry", "biology", "algorithm"],
    medicine: ["clinical", "patient", "trial", "health", "medical", "hospital", "treatment", "disease"],
    news: ["breaking", "report", "cnn", "bbc", "article", "today", "press", "news"],
    humanities: ["history", "philosophy", "literature", "culture", "essay", "analysis", "civilization"]
  };

  let best = "general";
  let bestScore = 0;

  for (let field in rules) {
    let score = 0;
    for (let k of rules[field]) {
      if (text.includes(k)) score++;
    }
    if (score > bestScore) {
      bestScore = score;
      best = field;
    }
  }

  return best;
}

function suggestField() {
  const text = document.getElementById("source").value;
  if (!text.trim()) return;

  const suggested = detectField(text);

  document.getElementById("suggestion").innerHTML =
    `Suggested: <strong>${suggested.toUpperCase()}</strong> (you may change it below)`;

  // Pre-select suggestion but allow override
  document.getElementById("field").value = suggested;
}

function classify(score) {
  if (score >= 4) return { status: "PASS", reason: "Strong indicator of reliability." };
  if (score === 3) return { status: "CAUTION", reason: "Moderate reliability; verify further." };
  return { status: "FAIL", reason: "Weak or unreliable indicator." };
}

function evaluate() {
  const labels = ["Currency", "Relevance", "Authority", "Accuracy", "Purpose"];

  const scores = [
    +document.getElementById("currency").value,
    +document.getElementById("relevance").value,
    +document.getElementById("authority").value,
    +document.getElementById("accuracy").value,
    +document.getElementById("purpose").value
  ];

  const field = document.getElementById("field").value;

  let pass = 0;
  let html = "<h3>CRAAP Breakdown</h3>";

  for (let i = 0; i < labels.length; i++) {
    const result = classify(scores[i]);
    if (result.status === "PASS") pass++;

    html += `
      <div class="box">
        <p><strong>${labels[i]}</strong></p>
        <p>Status: <span class="${result.status.toLowerCase()}">${result.status}</span></p>
        <p class="small">${result.reason}</p>
      </div>
    `;
  }

  let final =
    pass >= 4 ? "PASS ✔" :
    pass >= 2 ? "CAUTION ⚠" :
    "FAIL ✖";

  document.getElementById("result").innerHTML = `
    <div class="box">
      <h3>Overall Result: ${final}</h3>
    </div>
  `;

  document.getElementById("meta").innerHTML = `
    <div class="box">
      <p><strong>Author:</strong> ${document.getElementById("author").value || "Not provided"}</p>
      <p><strong>Year:</strong> ${document.getElementById("year").value || "Not provided"}</p>
      <p><strong>Outlet:</strong> ${document.getElementById("outlet").value || "Not provided"}</p>
      <p><strong>Summary:</strong> ${document.getElementById("summary").value || "Not provided"}</p>
    </div>

    <div class="box">
      <p><strong>Final Selected Field:</strong> ${field.toUpperCase()}</p>
    </div>
  `;
}
</script>

</body>
</html>
