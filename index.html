<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CRAAP v3.0 Analyzer</title>

<style>
  body {
    font-family: system-ui, Arial, sans-serif;
    max-width: 1000px;
    margin: auto;
    padding: 24px;
    background: #f4f6fb;
    color: #111827;
  }

  h1 {
    text-align: center;
    font-weight: 800;
  }

  .card {
    background: white;
    padding: 16px;
    margin: 14px 0;
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
  }

  label {
    font-weight: 600;
    margin-top: 10px;
    display: block;
  }

  input, select, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
  }

  textarea { height: 160px; }

  button {
    width: 100%;
    padding: 12px;
    margin-top: 14px;
    background: #2563eb;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 700;
    cursor: pointer;
  }

  button:hover {
    background: #1e40af;
  }

  .meta {
    background: #eef2ff;
    border-left: 6px solid #3b82f6;
    padding: 12px;
    border-radius: 10px;
    margin-bottom: 12px;
  }

  .craap-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
    gap: 12px;
  }

  .craap {
    background: white;
    padding: 14px;
    border-radius: 12px;
    border-left: 6px solid #ccc;
    box-shadow: 0 3px 10px rgba(0,0,0,0.06);
  }

  .pass { border-left-color: #22c55e; }
  .caution { border-left-color: #f59e0b; }
  .fail { border-left-color: #ef4444; }

  .tag {
    font-size: 12px;
    font-weight: 700;
    padding: 3px 8px;
    border-radius: 999px;
    color: white;
  }

  .tag.pass { background: #22c55e; }
  .tag.caution { background: #f59e0b; }
  .tag.fail { background: #ef4444; }

  .title {
    font-weight: 800;
    margin-bottom: 6px;
  }

  .small {
    font-size: 12px;
    color: #6b7280;
  }
</style>
</head>

<body>

<h1>CRAAP v3.0 Analyzer</h1>

<div class="card">

  <label>Research Topic</label>
  <input id="topic">

  <label>Publication Field</label>
  <select id="field">
    <option value="science">Science / Medicine</option>
    <option value="technology">Technology</option>
    <option value="social">Social Science</option>
    <option value="humanities">Humanities</option>
    <option value="news">News</option>
  </select>

  <label>Author</label>
  <input id="author">

  <label>Publication Date</label>
  <input id="date">

  <label>Publisher</label>
  <select id="publisherSelect" onchange="syncPublisher()">
    <option value="">Select publisher</option>
    <option value="reuters">Reuters</option>
    <option value="bbc">BBC</option>
    <option value="new york times">New York Times</option>
    <option value="washington post">Washington Post</option>
    <option value="cnn">CNN</option>
    <option value="nature">Nature</option>
    <option value="unknown">Unknown</option>
  </select>

  <input id="publisher" placeholder="Or type publisher">

  <label>Article Text</label>
  <textarea id="text"></textarea>

  <button onclick="evaluateCRAAP()">Evaluate Source</button>
</div>

<div class="card">
  <h2>Results</h2>
  <div id="output"></div>
</div>

<script>

/* SAFE SYNC */
function syncPublisher() {
  const sel = document.getElementById("publisherSelect");
  const input = document.getElementById("publisher");
  if (!sel || !input) return;
  input.value = sel.value;
}

/* SAFE TEXT CHECK */
function has(text, arr) {
  return arr.some(k => text.includes(k));
}

/* MAIN FUNCTION */
function evaluateCRAAP() {

  const text = (document.getElementById("text")?.value || "").toLowerCase();
  const topic = (document.getElementById("topic")?.value || "").toLowerCase();
  const field = document.getElementById("field")?.value || "";

  const author = document.getElementById("author")?.value || "";
  const date = document.getElementById("date")?.value || "";
  const publisher = (document.getElementById("publisher")?.value || "").toLowerCase();

  const year = (date.match(/\b(19|20)\d{2}\b/) || [])[0];
  const currentYear = new Date().getFullYear();

  function result(name, status, cls, explanation) {
    return `
      <div class="craap ${cls}">
        <div class="title">${name} <span class="tag ${cls}">${status}</span></div>
        <div>${explanation}</div>
      </div>
    `;
  }

  let html = "";

  /* CURRENCY */
  if (!year) {
    html += result("Currency", "CAUTION", "caution",
      "No publication year provided.");
  } else {
    const age = currentYear - parseInt(year);
    html += result("Currency",
      age <= 7 ? "PASS" : "FAIL",
      age <= 7 ? "pass" : "fail",
      `Published in ${year}, ${age} years ago.`);
  }

  /* AUTHORITY */
  if (!author) {
    html += result("Authority", "CAUTION", "caution",
      "No author provided.");
  } else {
    html += result("Authority", "PASS", "pass",
      `Author listed: ${author}.`);
  }

  /* RELEVANCE */
  html += result("Relevance",
    text.includes(topic) ? "PASS" : "FAIL",
    text.includes(topic) ? "pass" : "fail",
    text.includes(topic)
      ? "Direct connection to topic found."
      : "No clear link to topic.");

  /* ACCURACY */
  html += result("Accuracy",
    has(text, ["study","data","research"]) ? "PASS" : "FAIL",
    has(text, ["study","data","research"]) ? "pass" : "fail",
    "Checks for evidence-based language.");

  /* PURPOSE */
  html += result("Purpose",
    has(text, ["buy","sale","advert"]) ? "FAIL" : "PASS",
    has(text, ["buy","sale","advert"]) ? "fail" : "pass",
    "Detects commercial intent.");

  document.getElementById("output").innerHTML = html;
}

</script>

</body>
</html>
