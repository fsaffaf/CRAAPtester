<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Results</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
  }

  h1, h2 {
    text-align: center;
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    background: #eef;
    border-radius: 8px;
  }

  button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>CRAAP Results</h1>
  <div id="results" class="result"></div>
  <button onclick="resetApp()">Start Over</button>
</div>

<script>
function analyzeCRAAP() {
  const topic = localStorage.getItem("topic") || "";
  const author = localStorage.getItem("author") || "";
  const publisher = localStorage.getItem("publisher") || "";
  const date = localStorage.getItem("date") || "";
  const article = localStorage.getItem("article") || "";
  const field = localStorage.getItem("field") || "";

  let results = {};
  let score = 0;

  switch(field) {

    case "stem":
      results.currency = (new Date().getFullYear() - new Date(date).getFullYear() <= 5) ? "PASS ✅" : "FAIL ❌";
      results.authority = publisher.includes("journal") ? "PASS ✅" : "CAUTION ⚠️";
      results.accuracy = article.length > 1200 ? "PASS ✅" : "FAIL ❌";
      break;

    case "social":
      results.relevance = article.toLowerCase().includes(topic.toLowerCase()) ? "PASS ✅" : "FAIL ❌";
      results.authority = author ? "PASS ✅" : "CAUTION ⚠️";
      results.purpose = article.includes("always") ? "FAIL ❌" : "PASS ✅";
      break;

    case "humanities":
      results.currency = "NOT IMPORTANT 📚";
      results.authority = article.includes("letter") ? "PASS ✅ (Primary)" : "CAUTION ⚠️";
      results.accuracy = article.length > 500 ? "PASS ✅" : "CAUTION ⚠️";
      break;

    case "business":
      results.currency = (new Date().getFullYear() - new Date(date).getFullYear() <= 1) ? "PASS ✅" : "FAIL ❌";
      results.purpose = article.includes("buy") ? "CAUTION ⚠️" : "PASS ✅";
      break;

    case "news":
      results.accuracy = article.length > 800 ? "PASS ✅" : "CAUTION ⚠️";
      results.purpose = article.includes("shocking") ? "FAIL ❌" : "PASS ✅";
      break;
  }

  // Fill missing
  ["currency","relevance","authority","accuracy","purpose"].forEach(k => {
    if (!results[k]) results[k] = "CAUTION ⚠️";
  });

  document.getElementById("results").innerHTML = `
    <p><strong>Field:</strong> ${field}</p>
    <p><strong>Topic:</strong> ${topic}</p>
    <p><strong>Publisher:</strong> ${publisher}</p>

    <ul>
      <li><b>Currency:</b> ${results.currency}</li>
      <li><b>Relevance:</b> ${results.relevance}</li>
      <li><b>Authority:</b> ${results.authority}</li>
      <li><b>Accuracy:</b> ${results.accuracy}</li>
      <li><b>Purpose:</b> ${results.purpose}</li>
    </ul>
  `;
}

function resetApp() {
  localStorage.clear();
  window.location.href = "index.html";
}

window.onload = analyzeCRAAP;
</script>

</body>
</html>
