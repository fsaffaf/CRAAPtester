<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Results</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
  }

  .container {
    max-width: 750px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
  }

  h1 {
    text-align: center;
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    background: #eef;
    border-radius: 8px;
  }

  .section {
    margin-bottom: 15px;
  }

  small {
    color: #555;
  }

  button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>CRAAP Results</h1>
  <div id="results" class="result"></div>
  <button onclick="resetApp()">Start Over</button>
</div>

<script>
function analyzeCRAAP() {

  const topic = localStorage.getItem("topic") || "";
  const author = localStorage.getItem("author") || "";
  const publisher = localStorage.getItem("publisher") || "";
  const date = localStorage.getItem("date") || "";
  const article = localStorage.getItem("article") || "";
  const field = localStorage.getItem("field") || "";

  let results = {};

  function setResult(key, status, explanation) {
    results[key] = `
      <strong>${status}</strong><br>
      <small>${explanation}</small>
    `;
  }

/* =========================
   CALCULATE YEARS + CURRENCY
========================= */

let yearDiff = null;

if (!date) {
  // ✅ No date → FAIL, but DO NOT stop the program
  setResult(
    "currency",
    "FAIL ❌",
    "Caution: No publication date is provided, so the timeliness of this source cannot be evaluated. Currency is critical when determining reliability."
  );
} else {
  // ✅ Calculate years only if date exists
  yearDiff = new Date().getFullYear() - new Date(date).getFullYear();

  // ✅ Run your existing switch logic
  switch(field) {

    case "medical":
      if (yearDiff <= 4) {
        setResult("currency", "PASS ✅", "Medical sources must be very recent (0–4 years).");
      } else if (yearDiff === 5) {
        setResult("currency", "CAUTION ⚠️", "5-year-old medical sources may be slightly outdated.");
      } else {
        setResult("currency", "FAIL ❌", "Medical research older than 5 years is often unreliable.");
      }
      break;

    case "physics":
      setResult("currency", "PASS ✅", "Physics allows older foundational sources (no time limit).");
      break;

    case "engineering":
      if (yearDiff <= 4) {
        setResult("currency", "PASS ✅", "Recent engineering data (≤4 years) is preferred.");
      } else if (yearDiff <= 15) {
        setResult("currency", "CAUTION ⚠️", "Moderately old engineering info may still apply.");
      } else {
        setResult("currency", "FAIL ❌", "Engineering data over 15 years old is outdated.");
      }
      break;

    // ✅ keep ALL your other cases exactly as they are...

    default:
      setResult("currency", "CAUTION ⚠️", "No specific rule for this field.");
  }
}

  // if date is selected

  switch(field) {

    case "medical":
      if (yearDiff <= 4) {
        setResult("currency", "PASS ✅", "Medical sources must be very recent (0–4 years).");
      } else if (yearDiff === 5) {
        setResult("currency", "CAUTION ⚠️", "5-year-old medical sources may be slightly outdated.");
      } else {
        setResult("currency", "FAIL ❌", "Medical research older than 5 years is often unreliable.");
      }
      break;

    case "physics":
      setResult("currency", "PASS ✅", "Physics allows older foundational sources (no time limit).");
      break;

    case "engineering":
      if (yearDiff <= 4) {
        setResult("currency", "PASS ✅", "Recent engineering data (≤4 years) is preferred.");
      } else if (yearDiff <= 15) {
        setResult("currency", "CAUTION ⚠️", "Moderately old engineering info may still apply.");
      } else {
        setResult("currency", "FAIL ❌", "Engineering data over 15 years old is outdated.");
      }
      break;

    case "cs":
      if (yearDiff <= 4) {
        setResult("currency", "PASS ✅", "Computer science evolves quickly; recent sources required.");
      } else if (yearDiff === 5) {
        setResult("currency", "CAUTION ⚠️", "5-year-old computing information may be outdated.");
      } else {
        setResult("currency", "FAIL ❌", "Older computing data becomes obsolete quickly.");
      }
      break;

    case "psychology":
      if (yearDiff <= 4) {
        setResult("currency", "PASS ✅", "Recent psychology research (≤4 years) is ideal.");
      } else if (yearDiff <= 10) {
        setResult("currency", "CAUTION ⚠️", "Moderately old studies may still be valid.");
      } else {
        setResult("currency", "FAIL ❌", "Older psychology research may not reflect current findings.");
      }
      break;

    case "anthropology":
      setResult("currency", "PASS ✅", "Anthropology values sources regardless of age.");
      break;

    case "economics":
      if (yearDiff <= 5) {
        setResult("currency", "PASS ✅", "Economic data should be relatively recent (≤5 years).");
      } else if (yearDiff <= 10) {
        setResult("currency", "CAUTION ⚠️", "Older economic trends may still provide insight.");
      } else {
        setResult("currency", "FAIL ❌", "Outdated economic data may misrepresent conditions.");
      }
      break;

    case "political":
      if (yearDiff <= 5) {
        setResult("currency", "PASS ✅", "Recent political data is important.");
      } else if (yearDiff <= 15) {
        setResult("currency", "CAUTION ⚠️", "Older political analysis may still be useful.");
      } else {
        setResult("currency", "FAIL ❌", "Very old political sources may not apply today.");
      }
      break;

    case "humanities":
      setResult("currency", "PASS ✅", "Humanities value older and foundational works.");
      break;

    case "news":
      if (yearDiff === 0) {
        setResult("currency", "PASS ✅", "News must be extremely current (months old).");
      } else if (yearDiff === 1) {
        setResult("currency", "CAUTION ⚠️", "Slightly older news may still be relevant.");
      } else {
        setResult("currency", "FAIL ❌", "News over 1 year old is outdated.");
      }
      break;

    case "business":
      if (yearDiff <= 2) {
        setResult("currency", "PASS ✅", "Business data must be recent (≤2 years).");
      } else if (yearDiff <= 5) {
        setResult("currency", "CAUTION ⚠️", "Older business data may be risky.");
      } else {
        setResult("currency", "FAIL ❌", "Outdated business info can mislead decisions.");
      }
      break;

    case "government":
      if (yearDiff <= 1) {
        setResult("currency", "PASS ✅", "Current laws and policies are required.");
      } else {
        setResult("currency", "FAIL ❌", "Old laws may no longer apply.");
      }
      break;

    default:
      setResult("currency", "CAUTION ⚠️", "No specific rule for this field.");
  }

  /* =========================
     OTHER CRAAP COMPONENTS
  ========================= */

  // Relevance
  if (topic && article.toLowerCase().includes(topic.toLowerCase())) {
    setResult("relevance", "PASS ✅", "The article clearly relates to the topic.");
  } else {
    setResult("relevance", "CAUTION ⚠️", "The article may not strongly match the topic.");
  }

 /* =========================
    AUTHORITY
  ========================= */
  // Normalize input
const normalizedAuthor = author ? author.trim().toLowerCase() : "";

// Exact "no author" values
const noAuthorExact = ["none", "na", "n/a", "unknown", ""];

// Partial phrases that indicate no author
const noAuthorPartial = [
  "no author",
  "no listed author",
  "no identifiable author",
  "author not available",
  "author unavailable"
];

// Check conditions
const isExactMatch = noAuthorExact.includes(normalizedAuthor);
const isPartialMatch = noAuthorPartial.some(phrase =>
  normalizedAuthor.includes(phrase)
);

if (!isExactMatch && !isPartialMatch) {
  setResult("authority", "PASS ✅", "Author is identified, improving credibility.");
} else {
  setResult(
    "authority",
    "CAUTION ⚠️",
    "Caution: This source does not list an individual author. Individual credentials cannot be assessed. Evaluate the credibility of the publishing organization carefully to determine authority."
  );
}

  // Accuracy
  if (article.length > 1000) {
    setResult("accuracy", "PASS ✅", "Longer content suggests evidence and development.");
  } else if (article.length > 500) {
    setResult("accuracy", "CAUTION ⚠️", "Moderate detail, but may lack depth.");
  } else {
    setResult("accuracy", "FAIL ❌", "Too little content to verify accuracy.");
  }

  // Purpose (bias detection)
  if (article.match(/always|never|worst|best|shocking|unbelievable/i)) {
    setResult("purpose", "CAUTION ⚠️", "Strong or emotional language suggests bias.");
  } else {
    setResult("purpose", "PASS ✅", "Neutral tone suggests informational purpose.");
  }

  /* =========================
     DISPLAY
  ========================= */

  document.getElementById("results").innerHTML = `
    <div class="section"><strong>Field:</strong> ${field}</div>
    <div class="section"><strong>Topic:</strong> ${topic}</div>
    <div class="section"><strong>Publisher:</strong> ${publisher}</div>
    <div class="section"><strong>Years Old:</strong> ${yearDiff ?? "N/A"}</div>

    <hr>

    <div class="section"><b>Currency:</b><br>${results.currency}</div>
    <div class="section"><b>Relevance:</b><br>${results.relevance}</div>
    <div class="section"><b>Authority:</b><br>${results.authority}</div>
    <div class="section"><b>Accuracy:</b><br>${results.accuracy}</div>
    <div class="section"><b>Purpose:</b><br>${results.purpose}</div>
  `;
}

function resetApp() {
  localStorage.clear();
  window.location.href = "index.html";
}

window.onload = analyzeCRAAP;
</script>

</body>
</html>
