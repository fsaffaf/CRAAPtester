<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CRAAP Results</title>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #f4f4f4;
    padding: 20px;
  }

  .container {
    max-width: 700px;
    margin: auto;
    background: white;
    padding: 20px;
    border-radius: 10px;
  }

  h1, h2 {
    text-align: center;
  }

  .result {
    margin-top: 20px;
    padding: 15px;
    background: #eef;
    border-radius: 8px;
  }

  button {
    margin-top: 20px;
    padding: 10px;
    width: 100%;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
  }
</style>
</head>

<body>

<div class="container">
  <h1>CRAAP Results</h1>
  <div id="results" class="result"></div>
  <button onclick="resetApp()">Start Over</button>
</div>

<script>
function analyzeCRAAP() {
  const topic = localStorage.getItem("topic") || "";
  const author = localStorage.getItem("author") || "";
  const publisher = localStorage.getItem("publisher") || "";
  const date = localStorage.getItem("date") || "";
  const article = localStorage.getItem("article") || "";
  const field = localStorage.getItem("field") || "";

  let results = {};

  function setResult(key, status, explanation) {
    results[key] = `${status}<br><small>${explanation}</small>`;
  }

  switch(field) {

    /* ---------- STEM ---------- */
    case "stem":
      let yearDiff = date ? new Date().getFullYear() - new Date(date).getFullYear() : null;

      if (yearDiff !== null && yearDiff <= 5) {
        setResult("currency", "PASS ✅", "Recent research is critical in STEM fields (≤5 years).");
      } else {
        setResult("currency", "FAIL ❌", "STEM sources must be recent due to rapid advancements.");
      }

      if (publisher.toLowerCase().includes("journal") || publisher.toLowerCase().includes("university")) {
        setResult("authority", "PASS ✅", "Published by a research institution or journal.");
      } else {
        setResult("authority", "CAUTION ⚠️", "Not clearly a peer-reviewed or academic source.");
      }

      if (article.length > 1200) {
        setResult("accuracy", "PASS ✅", "Detailed content suggests data and methodology.");
      } else {
        setResult("accuracy", "FAIL ❌", "Too short to demonstrate rigorous scientific evidence.");
      }
      break;


    /* ---------- SOCIAL SCIENCES ---------- */
    case "social":
      if (topic && article.toLowerCase().includes(topic.toLowerCase())) {
        setResult("relevance", "PASS ✅", "Directly addresses the research topic.");
      } else {
        setResult("relevance", "FAIL ❌", "Does not clearly connect to the research focus.");
      }

      if (author) {
        setResult("authority", "PASS ✅", "Named author provides accountability and credibility.");
      } else {
        setResult("authority", "CAUTION ⚠️", "Missing author reduces credibility.");
      }

      if (article.match(/always|never|propaganda|bias/i)) {
        setResult("purpose", "FAIL ❌", "Contains signs of ideological bias.");
      } else {
        setResult("purpose", "PASS ✅", "No obvious bias detected.");
      }
      break;


    /* ---------- HUMANITIES ---------- */
    case "humanities":
      setResult("currency", "PASS ✅", "Older sources are valuable in humanities research.");

      if (article.match(/letter|diary|original/i)) {
        setResult("authority", "PASS ✅", "Appears to include or reference primary sources.");
      } else {
        setResult("authority", "CAUTION ⚠️", "Likely a secondary interpretation of events.");
      }

      if (article.length > 500) {
        setResult("accuracy", "PASS ✅", "Includes enough content to support interpretation.");
      } else {
        setResult("accuracy", "CAUTION ⚠️", "Limited evidence for strong interpretation.");
      }
      break;


    /* ---------- BUSINESS ---------- */
    case "business":
      let diff = date ? new Date().getFullYear() - new Date(date).getFullYear() : null;

      if (diff !== null && diff <= 1) {
        setResult("currency", "PASS ✅", "Business data must be very recent.");
      } else {
        setResult("currency", "FAIL ❌", "Outdated information may misrepresent market conditions.");
      }

      if (article.match(/buy|sale|advertisement/i)) {
        setResult("purpose", "CAUTION ⚠️", "Content may be trying to sell or promote.");
      } else {
        setResult("purpose", "PASS ✅", "Appears informational rather than promotional.");
      }
      break;


    /* ---------- NEWS ---------- */
    case "news":
      if (article.length > 800) {
        setResult("accuracy", "PASS ✅", "Sufficient detail suggests supported reporting.");
      } else {
        setResult("accuracy", "CAUTION ⚠️", "Short articles may lack full verification.");
      }

      if (article.match(/shocking|unbelievable|sensational/i)) {
        setResult("purpose", "FAIL ❌", "Language suggests sensationalism.");
      } else {
        setResult("purpose", "PASS ✅", "Neutral tone indicates objective reporting.");
      }
      break;
  }

  // Fill missing categories
  ["currency","relevance","authority","accuracy","purpose"].forEach(k => {
    if (!results[k]) {
      setResult(k, "CAUTION ⚠️", "Insufficient data to evaluate this category.");
    }
  });

  document.getElementById("results").innerHTML = `
    <p><strong>Field:</strong> ${field}</p>
    <p><strong>Topic:</strong> ${topic}</p>
    <p><strong>Publisher:</strong> ${publisher}</p>

    <ul>
      <li><b>Currency:</b><br>${results.currency}</li><br>
      <li><b>Relevance:</b><br>${results.relevance}</li><br>
      <li><b>Authority:</b><br>${results.authority}</li><br>
      <li><b>Accuracy:</b><br>${results.accuracy}</li><br>
      <li><b>Purpose:</b><br>${results.purpose}</li>
    </ul>
  `;
}

function resetApp() {
  localStorage.clear();
  window.location.href = "index.html";
}

window.onload = analyzeCRAAP;
</script>

</body>
</html>
