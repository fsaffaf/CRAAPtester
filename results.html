<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CRAAP Test Results</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      padding: 20px;
    }

    .container {
      max-width: 700px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h1, h2 {
      text-align: center;
    }

    .result {
      margin-top: 20px;
      padding: 15px;
      background: #eef;
      border-radius: 8px;
    }

    ul {
      padding-left: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px;
      width: 100%;
      background-color: #d9534f;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background-color: #c9302c;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>CRAAP Test Results</h1>
  <div id="results" class="result"></div>

  <button onclick="resetApp()">Start Over</button>
</div>

<script>
function analyzeCRAAP() {
  const topic = localStorage.getItem("topic") || "";
  const author = localStorage.getItem("author") || "";
  const date = localStorage.getItem("date") || "";
  const publisher = localStorage.getItem("publisher") || "";
  const article = localStorage.getItem("article") || "";

  let results = {
    currency: "",
    relevance: "",
    authority: "",
    accuracy: "",
    purpose: ""
  };

  // ✅ Currency
  if (date) {
    const year = new Date(date).getFullYear();
    const currentYear = new Date().getFullYear();
    const diff = currentYear - year;

    if (diff <= 2) results.currency = "PASS ✅";
    else if (diff <= 5) results.currency = "CAUTION ⚠️";
    else results.currency = "FAIL ❌";
  }

  // ✅ Relevance
  if (topic && article.toLowerCase().includes(topic.toLowerCase())) {
    results.relevance = "PASS ✅";
  } else {
    results.relevance = "CAUTION ⚠️";
  }

  // ✅ Authority
  const trusted = ["bbc", "ny times", "nature", "cnn", "reuters"];
  if (trusted.some(p => publisher.toLowerCase().includes(p))) {
    results.authority = "PASS ✅";
  } else if (author) {
    results.authority = "CAUTION ⚠️";
  } else {
    results.authority = "FAIL ❌";
  }

  // ✅ Accuracy
  if (article.length > 1500) {
    results.accuracy = "PASS ✅";
  } else if (article.length > 500) {
    results.accuracy = "CAUTION ⚠️";
  } else {
    results.accuracy = "FAIL ❌";
  }

  // ✅ Purpose (bias detection)
  const biasWords = ["always", "never", "worst", "best"];
  const hasBias = biasWords.some(word => article.toLowerCase().includes(word));

  if (hasBias) {
    results.purpose = "CAUTION ⚠️";
  } else {
    results.purpose = "PASS ✅";
  }

  // ✅ Display results
  document.getElementById("results").innerHTML = `
    <h2>CRAAP Evaluation</h2>

    <p><strong>Topic:</strong> ${topic}</p>
    <p><strong>Author:</strong> ${author}</p>
    <p><strong>Publisher:</strong> ${publisher}</p>

    <h3>Results</h3>
    <ul>
      <li><strong>Currency:</strong> ${results.currency}</li>
      <li><strong>Relevance:</strong> ${results.relevance}</li>
      <li><strong>Authority:</strong> ${results.authority}</li>
      <li><strong>Accuracy:</strong> ${results.accuracy}</li>
      <li><strong>Purpose:</strong> ${results.purpose}</li>
    </ul>
  `;
}

window.onload = analyzeCRAAP;
</script>
